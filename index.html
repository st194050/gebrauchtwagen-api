<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>carVertical Klon</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #f4f7f6;
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 50px;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 700px;
        text-align: center;
      }
      input {
        width: 80%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
      }
      button {
        background-color: #0056b3;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
      }
      button:hover {
        background-color: #004494;
      }

      #ergebnis-box {
        margin-top: 20px;
        padding: 15px;
        border-top: 2px solid #eee;
        display: none;
        text-align: left;
      }
      .error {
        color: red;
        font-weight: bold;
      }

      .report-header {
        border-bottom: 2px solid #eee;
        padding-bottom: 15px;
        margin-bottom: 20px;
      }

      .report-header h2 {
        margin: 0 0 10px 0;
        color: #1a1a1a;
      }

      .vin-badge {
        background: #e9ecef;
        padding: 5px 10px;
        border-radius: 5px;
        font-family: monospace;
        font-size: 14px;
        color: #495057;
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: 1fr 1fr; /* Zwei Spalten nebeneinander */
        gap: 20px;
      }

      .card {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
      }

      .card h3 {
        margin-top: 0;
        font-size: 16px;
        color: #6c757d;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 15px;
      }

      .data-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        font-size: 15px;
        border-bottom: 1px dashed #f0f0f0;
        padding-bottom: 8px;
      }

      .data-row:last-child {
        border-bottom: none;
        margin-bottom: 0;
        padding-bottom: 0;
      }

      .badge {
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: bold;
      }

      .badge-green {
        background-color: #d4edda;
        color: #155724;
      }

      .badge-red {
        background-color: #f8d7da;
        color: #721c24;
      }

      @media (max-width: 600px) {
        .dashboard-grid {
          grid-template-columns: 1fr;
        }
      }

      /* Container breiter machen für echten Report-Look */
      .container {
        max-width: 850px;
      }

      .report-hero {
        width: 100%;
        padding: 40px 20px;
        box-sizing: border-box;
        background: linear-gradient(135deg, #003a7a, #001f42);
        border-radius: 8px;
        margin-bottom: 25px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
      }

      .report-hero h2 {
        margin: 0 0 10px 0;
        font-size: 28px;
        color: #fff;
      }

      /* Loading Spinner */
      .loader-container {
        padding: 40px;
        text-align: center;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #0056b3;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 16px;
        color: #666;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Fahrzeughistorie prüfen</h2>
      <p>Gib eine VIN ein, um den Report zu laden.</p>

      <input type="text" id="vin-input" placeholder="z.B. WAUZZZ0MSNZ116800" />
      <br />
      <button onclick="sucheAuto()">Report abrufen</button>

      <div id="ergebnis-box"></div>
    </div>

    <script>
      // Funktion für das Abrufen des Reports
      async function sucheAuto() {
        const vin = document.getElementById("vin-input").value;
        const ergebnisBox = document.getElementById("ergebnis-box");

        if (!vin) {
          ergebnisBox.style.display = "block";
          ergebnisBox.innerHTML =
            '<p class="error">Bitte gib eine VIN ein!</p>';
          return;
        }

        //  Animation laden
        ergebnisBox.style.display = "block";
        ergebnisBox.innerHTML = `
            <div class="loader-container">
                <div class="spinner"></div>
                <p class="loading-text" id="loading-message">Verbinde mit Server...</p>
            </div>
        `;

        //  Lade Texte rotieren
        const messages = [
          "Entschlüssele VIN...",
          "Prüfe internationale Datenbanken...",
          "Analysiere Unfallhistorie...",
          "Report wird generiert...",
        ];
        let msgIndex = 0;
        const msgInterval = setInterval(() => {
          if (msgIndex < messages.length) {
            document.getElementById("loading-message").innerText =
              messages[msgIndex];
            msgIndex++;
          }
        }, 1000); // Alle 1000ms wechselt der Text

        try {
          // URL des Backends aufrufen
          const response = await fetch(
            `http://127.0.0.1:8000/api/report/${vin}`,
          );

          // Wartezeit von 2.5 Sekunden
          setTimeout(async () => {
            clearInterval(msgInterval); // Text Wechsel stoppen

            if (!response.ok) {
              ergebnisBox.innerHTML =
                '<p class="error">Fahrzeug nicht gefunden. Bitte überprüfe die VIN.</p>';
              return;
            }

            // JSON Daten auspacken
            const data = await response.json();
            const auto = data.daten;

            const unfallKlasse =
              auto.unfallfrei === "Ja" ? "badge-green" : "badge-red";
            const unfallText =
              auto.unfallfrei === "Ja"
                ? "Keine Schäden gemeldet"
                : auto.unfallfrei;

            ergebnisBox.innerHTML = `
              <!-- Premium Bild ganz oben -->
              <div class="report-hero">
                  <h2>${auto.modell}</h2>
                  <span class="vin-badge" style="background: rgba(255,255,255,0.2); color: white;">
                      VIN: ${auto.vin}
                  </span>
              </div>
    
              <div class="dashboard-grid">
                  <div class="card">
                      <h3>Fahrzeugdaten</h3>
                      <div class="data-row">
                          <span>Kilometerstand:</span>
                          <strong>${auto.kilometerstand.toLocaleString("de-DE")} km</strong>
                      </div>
                      <div class="data-row">
                          <span>Marktwert:</span>
                          <strong>~ ${auto.preis.toLocaleString("de-DE")} €</strong>
                      </div>
                  </div>
    
                  <div class="card">
                      <h3>Historie & Schäden</h3>
                      <div class="data-row">
                          <span>Unfallfrei:</span>
                          <span class="badge ${unfallKlasse}">${unfallText}</span>
                      </div>
                  </div>
    
                  <div class="card">
                      <h3>Fahrzeug Checks</h3>
                      <div class="data-row">
                          <span>Taxi/Mietwagen:</span>
                          <strong>${auto.fuer_taxi_benutzt}</strong>
                      </div>
                      <div class="data-row">
                          <span>Vorbesitzer:</span>
                          <strong>${auto.anzahl_vorbesitzer}</strong>
                      </div>
                  </div>
              </div>
            `;
          }, 2500); // 2.5 Sekunden warten
        } catch (error) {
          clearInterval(msgInterval);
          ergebnisBox.innerHTML =
            '<p class="error">Fehler bei der Verbindung zum Server.</p>';
          console.error(error);
        }
      }
    </script>
  </body>
</html>
